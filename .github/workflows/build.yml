name: Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} 打包
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install pymupdf pillow pyinstaller

      - name: PyInstaller 打包
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            pyinstaller \
              --onedir --windowed \
              --name "PDF图片提取工具" \
              --hidden-import pymupdf \
              --hidden-import PIL \
              --hidden-import PIL.Image \
              pdf_image_extractor_gui.py
            # 打包成 zip
            cd dist
            zip -r "PDF图片提取工具_macOS.zip" "PDF图片提取工具.app"
            mv "PDF图片提取工具_macOS.zip" ..
          else
            pyinstaller \
              --onefile --windowed \
              --name "PDF图片提取工具" \
              --hidden-import pymupdf \
              --hidden-import PIL \
              --hidden-import PIL.Image \
              pdf_image_extractor_gui.py
            cd dist
            mv "PDF图片提取工具.exe" "../PDF图片提取工具_Windows.exe"
          fi

      - name: 上传 macOS 产物
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: PDF图片提取工具_macOS
          path: PDF图片提取工具_macOS.zip

      - name: 上传 Windows 产物
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: PDF图片提取工具_Windows
          path: PDF图片提取工具_Windows.exe
